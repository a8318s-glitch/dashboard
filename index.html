<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面媒體教材製作申請數據智慧分析與業務管理儀表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(51, 65, 85, 0.05)',
                        'glass': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.5)'
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 9999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-800 font-sans min-h-screen flex flex-col antialiased selection:bg-rose-100 selection:text-rose-900">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-8 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="bg-gradient-to-tr from-rose-400 to-orange-300 text-white p-2.5 rounded-2xl shadow-sm shadow-orange-200">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-900">平面媒體教材製作申請數據智慧分析系統</h1>
                <p class="text-[11px] text-slate-400 font-medium">多媒體業務效能管理看板</p>
            </div>
        </div>
        
        <div class="bg-slate-100/80 p-1 rounded-xl flex space-x-1 border border-slate-200/40">
            <button data-tab="tabDashboard" class="tab-btn bg-white text-slate-800 shadow-sm px-4 py-2 text-xs font-semibold rounded-lg transition-all duration-200">數據儀表板</button>
            <button data-tab="tabTracker" class="tab-btn text-slate-500 hover:text-slate-800 px-4 py-2 text-xs font-medium rounded-lg transition-all duration-200">業務進度追蹤</button>
        </div>
    </header>

    <main class="flex-1 p-8 max-w-[1600px] w-full mx-auto space-y-8">
        
        <div id="dropzone" class="bg-white border border-slate-100 rounded-2xl p-12 text-center shadow-soft transition-all duration-300">
            <div class="max-w-md mx-auto flex flex-col items-center justify-center space-y-4">
                <div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500 animate-pulse">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path>
                    </svg>
                </div>
                <div class="space-y-1">
                    <p class="text-sm font-semibold text-slate-700">正在同步 Google Sheet 雲端大數據...</p>
                    <p class="text-xs text-slate-400">請稍候，系統正在為您即時分析最新業務數據</p>
                </div>
                <div class="flex items-center space-x-3 pt-2">
                    <input type="file" id="fileInput" accept=".xlsx, .xls" class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-white hover:bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl text-xs font-medium text-slate-600 transition-all shadow-sm">
                        手動上傳備援檔案
                    </button>
                </div>
            </div>
        </div>

        <div id="dashboardArea" class="hidden space-y-8">
            
            <div id="tabDashboard" class="tab-content active space-y-8">
                
                <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-soft flex flex-wrap gap-4 items-center">
                    <div class="flex-1 min-w-[240px] relative">
                        <input type="text" id="filterSearch" placeholder="搜尋單位、申請人或關鍵字..." class="w-full bg-slate-50/80 border border-slate-200/60 rounded-xl pl-4 pr-10 py-2.5 text-xs focus:outline-none focus:border-rose-400 focus:bg-white transition-all">
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <select id="filterCampus" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有院區</option></select>
                        <select id="filterDesigner" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有製作者</option></select>
                        <select id="filterCategory" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有教材類別</option></select>
                        <select id="filterStatus" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有狀態</option></select>
                        <select id="filterYear" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有年度</option></select>
                        <select id="filterMonth" class="bg-slate-50/80 border border-slate-200/60 rounded-xl px-4 py-2.5 text-xs text-slate-600 focus:outline-none focus:border-rose-400 focus:bg-white transition-all"><option value="">所有月份</option></select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-soft flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-[11px] font-bold tracking-wider text-slate-400 uppercase">總申請案</p>
                            <h3 id="kpiTotalOrders" class="text-2xl font-bold text-slate-800">0</h3>
                        </div>
                        <div class="p-3 bg-rose-50 text-rose-500 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg></div>
                    </div>
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-soft flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-[11px] font-bold tracking-wider text-slate-400 uppercase">已結案數</p>
                            <h3 id="kpiClosedOrders" class="text-2xl font-bold text-slate-800">0</h3>
                        </div>
                        <div class="p-3 bg-emerald-50 text-emerald-500 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                    </div>
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-soft flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-[11px] font-bold tracking-wider text-slate-400 uppercase">進行中案件</p>
                            <h3 id="kpiPendingOrders" class="text-2xl font-bold text-slate-800">0</h3>
                        </div>
                        <div class="p-3 bg-amber-50 text-amber-500 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                    </div>
                    <div class="bg-white border border-slate-100 p-6 rounded-2xl shadow-soft flex items-center justify-between">
                        <div class="space-y-1">
                            <p class="text-[11px] font-bold tracking-wider text-slate-400 uppercase">階段總達成率</p>
                            <h3 id="kpiCompletionRate" class="text-2xl font-bold text-slate-800">0%</h3>
                        </div>
                        <div class="p-3 bg-orange-50 text-orange-500 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-2xl shadow-soft border border-slate-100 flex flex-col">
                        <div class="mb-4"><h4 class="font-bold text-xs text-slate-800">月度趨勢分析動態圖</h4><p class="text-[10px] text-slate-400">各月份平面媒體教材申請案總量流向</p></div>
                        <div class="flex-1 min-h-[280px] relative"><canvas id="chartMonthlyTrend"></canvas></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-soft border border-slate-100 flex flex-col">
                        <div class="mb-4"><h4 class="font-bold text-xs text-slate-800">團隊成員業務排行榜 (在職橘/離職灰)</h4><p class="text-[10px] text-slate-400">依據承辦案件總量進行排序與人員動態註記</p></div>
                        <div class="flex-1 min-h-[280px] relative"><canvas id="chartDesignerOutput"></canvas></div>
                    </div>
                </div>

                <div class="bg-white border border-slate-100 rounded-2xl shadow-soft overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-50 flex items-center justify-between">
                        <div><h4 class="font-bold text-xs text-slate-800">平面教材申請明細清單</h4><p class="text-[10px] text-slate-400">目前預覽前 15 筆符合篩選條件之最新紀錄</p></div>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse text-xs">
                            <thead>
                                <tr class="bg-slate-50/70 text-slate-400 font-bold border-b border-slate-100">
                                    <th class="px-6 py-3.5">申請單號</th><th class="px-6 py-3.5">院區</th><th class="px-6 py-3.5">申請單位</th><th class="px-6 py-3.5">申請人</th><th class="px-6 py-3.5">申請日期</th><th class="px-6 py-3.5">教材類別</th><th class="px-6 py-3.5">製作者</th><th class="px-6 py-3.5">當前狀態</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-50 text-slate-600 font-medium"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tabTracker" class="tab-content space-y-6">
                <div id="trackerContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </main>

    <script>
        const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbxGIAuWSgtdH8QoATESPnYyRZOa4LOG9XCH2SLEBDK3fRnUiMr8gA8yXHYfrAEZ7ZGq0g/exec";
        const ACTIVE_EMPLOYEES = ['蕭麗香', '林雨蕎', '許召玟', '李偲詩', '李岱璇', '陳慧娟', '葉品妤', '陳琬婷', '黃怡瑄', '未指定'];
        const CATEGORY_MAP = {'1':'一般海報','2':'標示宣傳','3':'醫學海報','4':'衛教單張','5':'視訊媒體','6':'影像處理','7':'出版類','8':'Web類','9':'簡報','10':'現場拍','11':'其他'};

        let allData = [], trackerData = [], chartInstances = {};

        function convertCategoryToChinese(raw) {
            if(!raw) return '其他';
            return String(raw).split(/[\s,，、/]+/).map(p => CATEGORY_MAP[p.trim()] || p.trim()).join('、');
        }

        async function loadGoogleSheetData() {
            try {
                const response = await fetch(MY_GAS_URL);
                const json = await response.json();
                if (json.status === "success") { processAndRenderData(json); }
            } catch (error) { console.error("同步失敗:", error); }
        }

        function processAndRenderData(json) {
            allData = (json.sheet1Data || []).filter(item => item['申請單號']).map(item => ({
                '申請單號': String(item['申請單號']).trim(),
                '院區': String(item['院區'] || '永康總院').trim(),
                '科室': String(item['單位代碼'] || item['單位'] || '不分科').trim(),
                '申請人': String(item['申請人'] || '').trim(),
                '日期': item['申請日期'] || '-',
                '教材類別': convertCategoryToChinese(item['教材類別']),
                '製作者': String(item['製作者'] || '未指定').trim(),
                '狀態': String(item['狀態'] || '未結案').trim(),
                '年度': String(item['申請日期'] || '').substring(0,4),
                '月份': parseInt(String(item['申請日期'] || '').substring(5,7)) || 1
            }));

            trackerData = (json.sheet2Data || []).filter(item => item['項目'] || item['狀態']).map(item => {
                let status = String(item['狀態']).trim();
                let pct = 50;
                if (status === '已結案' || status === '已完成') { status = '已完成'; pct = 100; }
                else if (status === '規劃中') { pct = 15; }
                return { '項目': item['項目'], '承辦人': item['參與人員'] || '未分派', '狀態': status, '說明': item['備註說明'] || '暫無說明', '進度': pct };
            });

            const statusOrder = { '已完成': 1, '進行中': 2, '規劃中': 3 };
            trackerData.sort((a,b) => (statusOrder[a.狀態] || 4) - (statusOrder[b.狀態] || 4));

            document.getElementById('dropzone').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            
            initFilters(); 
            applyFilters(); 
            renderTrackerCards();
        }

        function initFilters() {
            const populate = (id, vals, prefix = "所有") => {
                const el = document.getElementById(id);
                const uniqueVals = [...new Set(vals)].filter(Boolean).sort();
                el.innerHTML = `<option value="">${prefix}${el.previousElementSibling?.textContent || el.id.replace('filter','')}</option>`;
                
                // 修正純中文顯示標題
                if(id==='filterCampus') el.innerHTML = '<option value="">所有院區</option>';
                if(id==='filterDesigner') el.innerHTML = '<option value="">所有製作者</option>';
                if(id==='filterCategory') el.innerHTML = '<option value="">所有教材類別</option>';
                if(id==='filterStatus') el.innerHTML = '<option value="">所有狀態</option>';
                if(id==='filterYear') el.innerHTML = '<option value="">所有年度</option>';
                if(id==='filterMonth') el.innerHTML = '<option value="">所有月份</option>';

                uniqueVals.forEach(v => {
                    if(id === 'filterMonth') {
                        el.innerHTML += `<option value="${v}">${v}月</option>`;
                    } else {
                        el.innerHTML += `<option value="${v}">${v}</option>`;
                    }
                });
            };

            populate('filterCampus', allData.map(d => d.院區));
            populate('filterDesigner', allData.map(d => d.製作者));
            
            // 抓取打散後的單一教材類別放入篩選器
            let allCats = [];
            allData.forEach(d => d.教材類別.split('、').forEach(c => allCats.push(c)));
            populate('filterCategory', allCats);
            
            populate('filterStatus', allData.map(d => d.狀態));
            populate('filterYear', allData.map(d => d.年度).filter(y => y && y.length === 4));
            populate('filterMonth', allData.map(d => d.月份));

            // 綁定事件
            ['filterSearch', 'filterCampus', 'filterDesigner', 'filterCategory', 'filterStatus', 'filterYear', 'filterMonth'].forEach(id => {
                document.getElementById(id).addEventListener('change', applyFilters);
                if(id === 'filterSearch') document.getElementById(id).addEventListener('input', applyFilters);
            });
        }

        function applyFilters() {
            const search = document.getElementById('filterSearch').value.toLowerCase();
            const campus = document.getElementById('filterCampus').value;
            const designer = document.getElementById('filterDesigner').value;
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const year = document.getElementById('filterYear').value;
            const month = document.getElementById('filterMonth').value;

            const filtered = allData.filter(d => {
                if (search && !Object.values(d).join(' ').toLowerCase().includes(search)) return false;
                if (campus && d.院區 !== campus) return false;
                if (designer && d.製作者 !== designer) return false;
                if (category && !d.教材類別.includes(category)) return false;
                if (status && d.狀態 !== status) return false;
                if (year && d.年度 !== year) return false;
                if (month && String(d.月份) !== month) return false;
                return true;
            });

            renderKpis(filtered); 
            renderCharts(filtered); 
            renderTable(filtered);
        }

        function renderKpis(data) {
            document.getElementById('kpiTotalOrders').textContent = data.length;
            const closed = data.filter(d => d.狀態 === '已結案' || d.狀態 === '已完成').length;
            document.getElementById('kpiClosedOrders').textContent = closed;
            document.getElementById('kpiPendingOrders').textContent = data.length - closed;
            document.getElementById('kpiCompletionRate').textContent = data.length ? Math.round(closed / data.length * 100) + '%' : '0%';
        }

        function renderCharts(data) {
            const ctx1 = document.getElementById('chartMonthlyTrend'), ctx2 = document.getElementById('chartDesignerOutput');
            if(chartInstances.trend) chartInstances.trend.destroy();
            if(chartInstances.bar) chartInstances.bar.destroy();

            const mCounts = new Array(12).fill(0);
            data.forEach(d => { if(d.月份 && d.月份 >= 1 && d.月份 <= 12) mCounts[d.月份-1]++; });
            
            chartInstances.trend = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
                    datasets: [{
                        label: '教材申請案量',
                        data: mCounts,
                        borderColor: '#f43f5e',
                        borderWidth: 3,
                        pointBackgroundColor: '#f43f5e',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(244, 63, 94, 0.04)'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f8fafc' } }, x: { grid: { display: false } } } }
            });

            const dMap = {};
            data.forEach(d => { dMap[d.製作者] = (dMap[d.製作者] || 0) + 1; });
            const sortedD = Object.entries(dMap).sort((a,b) => b[1]-a[1]);
            
            chartInstances.bar = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: sortedD.map(x => x[0]),
                    datasets: [{
                        data: sortedD.map(x => x[1]),
                        backgroundColor: sortedD.map(x => ACTIVE_EMPLOYEES.includes(x[0].replace(/\s+/g,'')) ? '#fb923c' : '#cbd5e1'),
                        borderRadius: 6,
                        barThickness: 14
                    }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: '#f8fafc' } }, y: { grid: { display: false } } } }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.slice(0, 15).map(d => {
                const isClosed = d.狀態==='已結案' || d.狀態==='已完成';
                const statusClass = isClosed ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-amber-50 text-amber-600 border border-amber-100';
                const designerClass = ACTIVE_EMPLOYEES.includes(d.製作者.replace(/\s+/g,'')) ? 'text-slate-700 font-semibold' : 'text-slate-300 line-through';
                
                return `<tr class="hover:bg-slate-50/80 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-900">${d.申請單號}</td>
                    <td class="px-6 py-4"><span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md text-[11px] font-medium">${d.院區}</span></td>
                    <td class="px-6 py-4 font-medium text-slate-700">${d.科室}</td>
                    <td class="px-6 py-4 text-slate-500">${d.申請人}</td>
                    <td class="px-6 py-4 text-slate-400 font-mono">${d.日期}</td>
                    <td class="px-6 py-4"><span class="bg-rose-50/60 text-rose-600 px-2 py-0.5 rounded-md text-[11px] font-medium">${d.教材類別}</span></td>
                    <td class="px-6 py-4 ${designerClass}">${d.製作者}</td>
                    <td class="px-6 py-4"><span class="${statusClass} px-2 py-0.5 rounded-full text-[10px] font-bold">${d.狀態}</span></td>
                </tr>`;
            }).join('');
        }

        function renderTrackerCards() {
            const container = document.getElementById('trackerContainer');
            if(!trackerData.length) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-xs">暫無業務進度追蹤數據</div>`;
                return;
            }
            container.innerHTML = trackerData.map(d => {
                let color = 'from-rose-400 to-rose-500';
                if(d.進度 === 100) color = 'from-emerald-400 to-emerald-500';
                else if(d.進度 === 15) color = 'from-amber-400 to-amber-500';
                
                return `<div class="bg-white p-6 rounded-2xl shadow-soft border border-slate-100/60 flex flex-col justify-between space-y-4 hover:border-rose-100 transition-all duration-200">
                    <div class="space-y-2">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-xs text-slate-800 leading-tight">${d.項目}</h3>
                            <span class="text-[10px] bg-slate-50 text-slate-500 border border-slate-200/60 px-2 py-0.5 rounded-md font-medium shrink-0 ml-2">${d.承辦人}</span>
                        </div>
                        <p class="text-[11px] text-slate-400 font-medium leading-relaxed">${d.說明}</p>
                    </div>
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400"><span>工作進度</span><span>${d.進度}%</span></div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-gradient-to-r ${color} h-full rounded-full transition-all duration-500" style="width:${d.進度}%"></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.addEventListener('DOMContentLoaded', loadGoogleSheetData);
        
        // 頁籤切換控制
        document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn text-slate-500 hover:text-slate-800 px-4 py-2 text-xs font-medium rounded-lg transition-all duration-200");
            btn.className = "tab-btn bg-white text-slate-800 shadow-sm px-4 py-2 text-xs font-semibold rounded-lg transition-all duration-200";
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    </script>
</body>
</html>
