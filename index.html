<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面媒體教材製作申請數據智慧分析與業務管理儀表板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] },
                    boxShadow: { 'soft': '0 4px 20px -2px rgba(51, 65, 85, 0.05)', 'glass': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.5)' }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50/50 text-slate-800 font-sans min-h-screen flex flex-col antialiased">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/80 sticky top-0 z-40 px-6 py-4 flex items-center justify-between shadow-glass">
        <div class="flex items-center space-x-3.5">
            <div class="bg-gradient-to-tr from-rose-400 to-orange-300 text-white p-2.5 rounded-xl">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <div>
                <h1 class="text-base font-bold">平面媒體教材製作申請數據智慧分析系統</h1>
                <p class="text-[11px] text-slate-400">多媒體業務效能管理看板</p>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button data-tab="tabDashboard" class="tab-btn bg-rose-50 text-rose-600 px-4 py-2 text-xs font-semibold rounded-xl">數據儀表板</button>
            <button data-tab="tabTracker" class="tab-btn text-slate-500 px-4 py-2 text-xs font-medium rounded-xl">業務進度追蹤</button>
        </div>
    </header>

    <main class="flex-1 p-6 max-w-[1500px] w-full mx-auto space-y-6">
        <div id="dropzone" class="bg-white border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center transition-all hover:border-rose-300 group">
            <div class="max-w-md mx-auto flex flex-col items-center justify-center space-y-4">
                <p class="text-sm font-semibold text-slate-700">正在同步 Google Sheet 雲端大數據...</p>
                <div class="flex space-x-3 pt-2">
                    <input type="file" id="fileInput" accept=".xlsx, .xls" class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-xs font-medium">手動上傳備援檔案</button>
                </div>
            </div>
        </div>

        <div id="dashboardArea" class="hidden space-y-6">
            <div id="tabDashboard" class="tab-content space-y-6">
                <div class="bg-white border border-slate-100 rounded-2xl p-4 shadow-soft flex flex-wrap gap-3">
                    <input type="text" id="filterSearch" placeholder="搜尋關鍵字..." class="border border-slate-200 rounded-xl px-3 py-1.5 text-xs flex-1">
                    <select id="filterCampus" class="border border-slate-200 rounded-xl px-3 py-1.5 text-xs"><option value="">院區</option></select>
                    <select id="filterDesigner" class="border border-slate-200 rounded-xl px-3 py-1.5 text-xs"><option value="">承辦人</option></select>
                    <select id="filterYear" class="border border-slate-200 rounded-xl px-3 py-1.5 text-xs"><option value="">年度</option></select>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                    <div class="bg-white p-4 rounded-2xl shadow-soft"><p class="text-[11px] text-slate-400 font-bold">總申請案</p><h3 id="kpiTotalOrders" class="text-xl font-bold">0</h3></div>
                    <div class="bg-white p-4 rounded-2xl shadow-soft"><p class="text-[11px] text-slate-400 font-bold">達成率</p><h3 id="kpiCompletionRate" class="text-xl font-bold">0%</h3></div>
                    <div class="bg-white p-4 rounded-2xl shadow-soft"><p class="text-[11px] text-slate-400 font-bold">進行中</p><h3 id="kpiPendingOrders" class="text-xl font-bold">0</h3></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 rounded-2xl shadow-soft"><h4 class="font-bold text-xs mb-3">月度趨勢</h4><div class="h-56"><canvas id="chartMonthlyTrend"></canvas></div></div>
                    <div class="bg-white p-4 rounded-2xl shadow-soft"><h4 class="font-bold text-xs mb-3">業務排行榜 (在職橘/離職灰)</h4><div class="h-56"><canvas id="chartDesignerOutput"></canvas></div></div>
                </div>

                <div class="bg-white border border-slate-100 rounded-2xl shadow-soft overflow-hidden">
                    <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead class="bg-slate-50 text-slate-400 font-bold"><tr><th class="px-5 py-3">單號</th><th class="px-5 py-3">單位</th><th class="px-5 py-3">申請人</th><th class="px-5 py-3">日期</th><th class="px-5 py-3">教材</th><th class="px-5 py-3">製作者</th><th class="px-5 py-3">狀態</th></tr></thead><tbody id="tableBody" class="divide-y divide-slate-100"></tbody></table></div>
                </div>
            </div>

            <div id="tabTracker" class="tab-content hidden space-y-6">
                <div id="trackerContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            </div>
        </div>
    </main>

    <script>
        const MY_GAS_URL = "https://script.google.com/macros/s/AKfycbxGIAuWSgtdH8QoATESPnYyRZOa4LOG9XCH2SLEBDK3fRnUiMr8gA8yXHYfrAEZ7ZGq0g/exec";
        const ACTIVE_EMPLOYEES = ['蕭麗香', '林雨蕎', '許召玟', '李偲詩', '李岱璇', '陳慧娟', '葉品妤', '陳琬婷', '黃怡瑄', '未指定'];
        const CATEGORY_MAP = {'1':'一般海報','2':'標示宣傳','3':'醫學海報','4':'衛教單張','5':'視訊媒體','6':'影像處理','7':'出版類','8':'Web類','9':'簡報','10':'現場拍','11':'其他'};

        let allData = [], trackerData = [], chartInstances = {};

        function convertCategoryToChinese(raw) {
            if(!raw) return '其他';
            return String(raw).split(/[\s,，、/]+/).map(p => CATEGORY_MAP[p.trim()] || p.trim()).join('、');
        }

        async function loadGoogleSheetData() {
            try {
                const response = await fetch(MY_GAS_URL);
                const json = await response.json();
                if (json.status === "success") { processAndRenderData(json); }
            } catch (error) { console.error("同步失敗:", error); }
        }

        function processAndRenderData(json) {
            allData = (json.sheet1Data || []).filter(item => item['申請單號']).map(item => ({
                '申請單號': String(item['申請單號']).trim(),
                '院區': String(item['院區'] || '永康總院').trim(),
                '科室': String(item['單位代碼'] || item['單位'] || '不分科').trim(),
                '申請人': String(item['申請人'] || '').trim(),
                '日期': item['申請日期'] || '-',
                '教材類別': convertCategoryToChinese(item['教材類別']),
                '製作者': String(item['製作者'] || '未指定').trim(),
                '狀態': String(item['狀態'] || '未結案').trim(),
                '年度': String(item['申請日期'] || '').substring(0,4),
                '月份': parseInt(String(item['申請日期'] || '').substring(5,7)) || 1
            }));

            trackerData = (json.sheet2Data || []).filter(item => item['項目'] || item['狀態']).map(item => {
                let status = String(item['狀態']).trim();
                let pct = 50;
                if (status === '已結案' || status === '已完成') { status = '已完成'; pct = 100; }
                else if (status === '規劃中') { pct = 15; }
                return { '項目': item['項目'], '承辦人': item['參與人員'] || '未分派', '狀態': status, '說明': item['備註說明'] || '暫無說明', '進度': pct };
            });

            const statusOrder = { '已完成': 1, '進行中': 2, '規劃中': 3 };
            trackerData.sort((a,b) => (statusOrder[a.狀態] || 4) - (statusOrder[b.狀態] || 4));

            document.getElementById('dropzone').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            initFilters(); applyFilters(); renderTrackerCards();
        }

        function initFilters() {
            const populate = (id, vals) => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="">全部</option>' + [...new Set(vals)].filter(Boolean).map(v => `<option value="${v}">${v}</option>`).join('');
            };
            populate('filterCampus', allData.map(d => d.院區));
            populate('filterDesigner', allData.map(d => d.製作者));
            populate('filterYear', ['2024', '2025', '2026']);
        }

        function applyFilters() {
            const search = document.getElementById('filterSearch').value.toLowerCase();
            const campus = document.getElementById('filterCampus').value;
            const designer = document.getElementById('filterDesigner').value;
            const year = document.getElementById('filterYear').value;

            const filtered = allData.filter(d => {
                if (search && !Object.values(d).join(' ').toLowerCase().includes(search)) return false;
                if (campus && d.院區 !== campus) return false;
                if (designer && d.製作者 !== designer) return false;
                if (year && d.年度 !== year) return false;
                return true;
            });

            renderKpis(filtered); renderCharts(filtered); renderTable(filtered);
        }

        function renderKpis(data) {
            document.getElementById('kpiTotalOrders').textContent = data.length;
            const closed = data.filter(d => d.狀態 === '已結案' || d.狀態 === '已完成').length;
            document.getElementById('kpiCompletionRate').textContent = data.length ? Math.round(closed/data.length*100) + '%' : '0%';
            document.getElementById('kpiPendingOrders').textContent = data.length - closed;
        }

        function renderCharts(data) {
            const ctx1 = document.getElementById('chartMonthlyTrend'), ctx2 = document.getElementById('chartDesignerOutput');
            if(chartInstances.trend) chartInstances.trend.destroy();
            if(chartInstances.bar) chartInstances.bar.destroy();

            const mCounts = new Array(12).fill(0);
            data.forEach(d => { if(d.月份) mCounts[d.月份-1]++; });
            chartInstances.trend = new Chart(ctx1, { type: 'line', data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets: [{ label: '案件數', data: mCounts, borderColor: '#f43f5e', fill: true, backgroundColor: 'rgba(244,63,94,0.1)' }] }, options: { maintainAspectRatio: false } });

            const dMap = {};
            data.forEach(d => { dMap[d.製作者] = (dMap[d.製作者] || 0) + 1; });
            const sortedD = Object.entries(dMap).sort((a,b) => b[1]-a[1]);
            chartInstances.bar = new Chart(ctx2, { type: 'bar', data: { labels: sortedD.map(x => x[0]), datasets: [{ data: sortedD.map(x => x[1]), backgroundColor: sortedD.map(x => ACTIVE_EMPLOYEES.includes(x[0].replace(/\s+/g,'')) ? '#fb923c' : '#e2e8f0') }] }, options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.slice(0, 15).map(d => `<tr><td class="px-5 py-3 font-bold">${d.申請單號}</td><td class="px-5 py-3">${d.科室}</td><td class="px-5 py-3">${d.申請人}</td><td class="px-5 py-3 text-slate-400">${d.日期}</td><td class="px-5 py-3"><span class="bg-slate-100 px-1.5 py-0.5 rounded">${d.教材類別}</span></td><td class="px-5 py-3 ${ACTIVE_EMPLOYEES.includes(d.製作者.replace(/\s+/g,'')) ? 'text-slate-700' : 'text-slate-300'}">${d.製作者}</td><td class="px-5 py-3"><span class="${d.狀態==='已結案'||d.狀態==='已完成'?'text-emerald-600':'text-amber-600'}">${d.狀態}</span></td></tr>`).join('');
        }

        function renderTrackerCards() {
            const container = document.getElementById('trackerContainer');
            container.innerHTML = trackerData.map(d => `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <div class="flex justify-between mb-2"><h3 class="font-bold text-xs">${d.項目}</h3><span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded-lg">${d.承辦人}</span></div>
                <p class="text-[11px] text-slate-400 mb-3">${d.說明}</p>
                <div class="w-full bg-slate-100 h-1.5 rounded-full"><div class="${d.進度===100?'bg-emerald-400':d.進度===15?'bg-amber-400':'bg-rose-400'} h-full rounded-full" style="width:${d.進度}%"></div></div>
            </div>`).join('');
        }

        window.addEventListener('DOMContentLoaded', loadGoogleSheetData);
        document.querySelectorAll('.tab-btn').forEach(btn => btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn text-slate-500 px-4 py-2 text-xs font-medium rounded-xl");
            btn.className = "tab-btn bg-rose-50 text-rose-600 px-4 py-2 text-xs font-semibold rounded-xl transition-all shadow-sm";
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        });
    </script>
</body>
</html>
